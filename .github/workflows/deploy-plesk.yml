name: Deploy to Plesk via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: plesk-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Prepare FTP payload
        run: |
          rm -rf .deploy
          mkdir -p .deploy
          cp -r dist prisma server .deploy/
          cp package.json package-lock.json PLESK_DEPLOY.md .env.plesk.example .deploy/

      - name: Deploy by FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./.deploy/
          exclude: |
            **/.env*
            **/data/db.json
